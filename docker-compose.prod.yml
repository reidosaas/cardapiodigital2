services:
  postgres:
    image: postgres:16-alpine
    container_name: cardapio-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: cardapio
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cardapio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cardapio-network

  redis:
    image: redis:7-alpine
    container_name: cardapio-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - cardapio-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cardapio-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - cardapio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://cardapioai.reidosaas.com.br
    container_name: cardapio-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - PORT=3000
    networks:
      - cardapio-network

  nginx:
    image: nginx:alpine
    container_name: cardapio-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - frontend
      - backend
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - cardapio-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  cardapio-network:
    driver: bridge
